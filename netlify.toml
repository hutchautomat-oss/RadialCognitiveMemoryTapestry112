# Netlify configuration for RCMT frontend (artifacts/rcmt)
# Vite + React SPA inside a pnpm workspace.
# Build output: artifacts/rcmt/dist/public  (see vite.config.ts outDir)
# Vite copies public/ verbatim into dist/public/, so artifacts/rcmt/public/_redirects
# lands in the publish dir automatically.

[build]
  # Enable pnpm via corepack, install from the repo root so workspace links
    # resolve, then build only the rcmt package.
      command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/rcmt run build"
        publish = "artifacts/rcmt/dist/public"
        
        [build.environment]
          # Node 24 — the project relies on import.meta.dirname (Node >= 20.11) and is
            # pinned to Node 24 in replit.md. Netlify's default is older, so pin it here.
              NODE_VERSION = "24"
                # pnpm version compatible with the committed lockfile.
                  PNPM_VERSION = "10"
                    # BASE_PATH must be "/" for a root-hosted Netlify site (read by vite.config.ts).
                      BASE_PATH = "/"
                        NODE_ENV  = "production"
                        
                        # SPA fallback. Also covered by the _redirects file in the publish dir; kept
                        # here as belt-and-suspenders so client-side routing works on deep links.
                        [[redirects]]
                          from   = "/*"
                            to     = "/index.html"
                              status = 200
