kind = "slides"
previewPath = "/rcmt-deck/"
title = "RCMT Vision Deck"
version = "1.0.0"
id = "artifacts/rcmt-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rcmt-deck/" ]
localPort = 23982

[services.development]
run = "pnpm --filter @workspace/rcmt-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rcmt-deck", "run", "build" ]
publicDir = "artifacts/rcmt-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23982"
BASE_PATH = "/rcmt-deck/"
