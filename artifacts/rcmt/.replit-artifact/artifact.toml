kind = "web"
previewPath = "/"
title = "RCMT Platinum Monolith"
version = "1.0.0"
id = "artifacts/rcmt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20888

[services.development]
run = "pnpm --filter @workspace/rcmt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rcmt", "run", "build" ]
publicDir = "artifacts/rcmt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20888"
BASE_PATH = "/"
